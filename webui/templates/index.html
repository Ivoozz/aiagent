<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>aiagent — Web UI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 1rem 1.5rem;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }
    header .badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      background: #3b4eff22;
      color: #7b8fff;
      border: 1px solid #3b4eff55;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .msg {
      max-width: 820px;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg.user    { background: #1e3a5f; align-self: flex-end; }
    .msg.thought { background: #1a1d27; border-left: 3px solid #7b8fff; color: #aab0cc; }
    .msg.command { background: #111a11; border-left: 3px solid #4caf50; font-family: monospace; }
    .msg.output  { background: #0d0d0d; border-left: 3px solid #888; font-family: monospace; white-space: pre-wrap; font-size: 0.8rem; color: #ccc; }
    .msg.done    { background: #1a2e1a; border-left: 3px solid #4caf50; }
    .msg.error   { background: #2e1a1a; border-left: 3px solid #f44336; }

    .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
      opacity: 0.6;
    }

    footer {
      padding: 0.75rem 1.5rem;
      background: #1a1d27;
      border-top: 1px solid #2a2d3a;
      display: flex;
      gap: 0.5rem;
    }

    #goal {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      border: 1px solid #2a2d3a;
      background: #0f1117;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
    }

    #goal:focus { border-color: #3b4eff88; }

    #send {
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      border: none;
      background: #3b4eff;
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send:hover:not(:disabled) { background: #5566ff; }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 aiagent</h1>
    <span class="badge">Web UI</span>
  </header>

  <div id="log"></div>

  <footer>
    <input id="goal" type="text" placeholder="Enter your goal…" autocomplete="off" />
    <button id="send">Send</button>
  </footer>

  <script src="/static/chat.js"></script>
</body>
</html>
